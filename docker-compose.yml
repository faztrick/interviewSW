services:
  postgres:
    image: postgres:16-alpine
    container_name: interviewsw-postgres
    environment:
      POSTGRES_DB: interviewsw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interviewsw"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interviewsw-app
    environment:
      PORT: 8080
      JWT_SECRET: development-secret
      JWT_ISSUER: interviewsw
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/interviewsw?sslmode=disable
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
